name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm -r exec tsc --noEmit

      - name: Test
        run: pnpm test

  schema-drift:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    needs: lint-test
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check schema drift
        run: pnpm check-drift

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: schema-drift
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t sofia-api:${{ github.sha }} .

      - name: Build Worker image
        run: docker build -f Dockerfile.worker -t sofia-worker:${{ github.sha }} .

      - name: Build Admin image
        run: docker build -f Dockerfile.admin -t sofia-admin:${{ github.sha }} .
