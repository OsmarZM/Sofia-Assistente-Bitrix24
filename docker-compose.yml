version: '3.9'

services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      retries: 5

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      API_PORT: '3001'
      ADMIN_ORIGIN: 'http://admin:3000'
      NODE_ENV: production
    ports:
      - '3001:3001'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Worker ────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Admin ─────────────────────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: 'http://api:3001'
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: 'http://api:3001'
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
